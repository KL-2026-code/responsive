<!-- MAIN CONTENT -->
<main>
  <h1 class="text-3xl font-bold mb-4">Kontakt</h1>
  <p>Ihr könnt uns über das Formular unten erreichen oder direkt per E-Mail und Telefon:</p>

  <ul class="list-disc pl-6 mt-4 space-y-2">
    <li>Email: <a href="mailto:info@aikido-hamm.de" class="text-blue-700 hover:text-blue-400">info@aikido-hamm.de</a></li>
    
  </ul>

  <h2 class="mt-6 text-xl font-bold mb-2">Kontaktformular</h2>
  
  <form class="space-y-4" action="sendmail.php" method="post">
    <div>
      <label class="block mb-1 font-semibold" for="name">Name</label>
      <input type="text" id="name" name="name" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>
    <div>
      <label class="block mb-1 font-semibold" for="email">E-Mail</label>
      <input type="email" id="email" name="email" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>
    <div>
      <label class="block mb-1 font-semibold" for="message">Nachricht</label>
      <textarea id="message" name="message" rows="5" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
    </div>
    <button type="submit" class="bg-blue-700 text-white px-5 py-2 rounded hover:bg-blue-500 transition">Absenden</button>
  </form>
</main>
